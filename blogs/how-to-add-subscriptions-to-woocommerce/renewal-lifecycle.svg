<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Subscription renewal lifecycle</title><desc id="desc">Flowchart showing checkout, parent order, subscription, renewal order, automatic or manual payment, success, failure, repeat, and end.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3 0 6z" fill="#873EFF"/></marker></defs>
  <rect width="1200" height="760" fill="#FAF8FF"/>
  <g font-family="Arial, sans-serif">
    <text x="60" y="64" fill="#12002B" font-size="38" font-weight="700">From first checkout to the next decision</text><text x="60" y="100" fill="#5B476F" font-size="19">Orders record events; the agreement carries the schedule.</text>
    <g font-size="19" font-weight="700" text-anchor="middle"><rect x="55" y="165" width="185" height="78" rx="18" fill="#F0E9FF" stroke="#BFA8EA" stroke-width="2"/><text x="148" y="211" fill="#12002B">Product</text><rect x="285" y="165" width="185" height="78" rx="18" fill="#F0E9FF" stroke="#BFA8EA" stroke-width="2"/><text x="378" y="211" fill="#12002B">Checkout</text><rect x="515" y="165" width="185" height="78" rx="18" fill="#fff" stroke="#873EFF" stroke-width="3"/><text x="608" y="199" fill="#12002B">Parent order</text><text x="608" y="222" fill="#5B476F" font-size="14">signup transaction</text><rect x="745" y="165" width="185" height="78" rx="18" fill="#873EFF"/><text x="838" y="199" fill="#fff">Subscription</text><text x="838" y="222" fill="#E9DEFF" font-size="14">live agreement</text><rect x="975" y="165" width="170" height="78" rx="18" fill="#F0E9FF" stroke="#BFA8EA" stroke-width="2"/><text x="1060" y="199" fill="#12002B">Due action</text><text x="1060" y="222" fill="#5B476F" font-size="14">next payment</text></g>
    <g stroke="#873EFF" stroke-width="3" marker-end="url(#a)"><path d="M240 204h42"/><path d="M470 204h42"/><path d="M700 204h42"/><path d="M930 204h42"/></g>
    <path d="M1060 243v62H600v40" fill="none" stroke="#873EFF" stroke-width="3" marker-end="url(#a)"/>
    <rect x="445" y="350" width="310" height="82" rx="20" fill="#12002B"/><text x="600" y="385" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="22" font-weight="700">Renewal order created</text><text x="600" y="412" text-anchor="middle" fill="#DCCFF0" font-family="Arial, sans-serif" font-size="16">one transaction record</text>
    <path d="M600 432v55M600 487H315v42M600 487H885v42" fill="none" stroke="#873EFF" stroke-width="3" marker-end="url(#a)"/>
    <text x="435" y="477" fill="#873EFF" font-family="Arial, sans-serif" font-size="16" font-weight="700">AUTOMATIC</text><text x="718" y="477" fill="#FE8218" font-family="Arial, sans-serif" font-size="16" font-weight="700">MANUAL</text>
    <rect x="160" y="532" width="310" height="80" rx="20" fill="#E9F7EF" stroke="#8AD0A8" stroke-width="2"/><text x="315" y="566" text-anchor="middle" fill="#12002B" font-family="Arial, sans-serif" font-size="21" font-weight="700">Gateway attempts charge</text><text x="315" y="592" text-anchor="middle" fill="#5B476F" font-family="Arial, sans-serif" font-size="16">stored payment method</text>
    <rect x="730" y="532" width="310" height="80" rx="20" fill="#FFF1E3" stroke="#F6BD80" stroke-width="2"/><text x="885" y="566" text-anchor="middle" fill="#12002B" font-family="Arial, sans-serif" font-size="21" font-weight="700">Customer pays invoice</text><text x="885" y="592" text-anchor="middle" fill="#5B476F" font-family="Arial, sans-serif" font-size="16">returns to checkout</text>
    <path d="M315 612v44h155M885 612v44H730" fill="none" stroke="#873EFF" stroke-width="3" marker-end="url(#a)"/>
    <rect x="470" y="628" width="260" height="70" rx="18" fill="#18A554"/><text x="600" y="658" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="20" font-weight="700">Paid → next date</text><text x="600" y="681" text-anchor="middle" fill="#DFF6E9" font-family="Arial, sans-serif" font-size="14">or failed → recovery / end</text>
    <path d="M730 663h350v-350H838v-67" fill="none" stroke="#873EFF" stroke-width="3" stroke-dasharray="9 9" marker-end="url(#a)"/>
    <text x="955" y="650" fill="#5B476F" font-family="Arial, sans-serif" font-size="15">repeat while active</text>
  </g>
</svg>
