<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Illustrative first charge components</title><desc id="desc">A donut chart showing a 50 dollar checkout total with 40 dollars for the first period and a 10 dollar sign-up fee.</desc>
  <rect width="1200" height="620" fill="#FAF8FF"/>
  <g font-family="Arial, sans-serif">
    <text x="70" y="68" fill="#12002B" font-size="38" font-weight="700">Explain the amount due today</text><text x="70" y="105" fill="#5B476F" font-size="19">A transparent worked example · not customer-behavior data</text>
    <rect x="70" y="145" width="1060" height="400" rx="28" fill="#fff" stroke="#DED2F4" stroke-width="2"/>
    <g transform="translate(330 345) rotate(-90)"><circle r="128" fill="none" stroke="#F0E9FF" stroke-width="58"/><circle r="128" fill="none" stroke="#873EFF" stroke-width="58" stroke-dasharray="643.4 160.8"/><circle r="128" fill="none" stroke="#FE8218" stroke-width="58" stroke-dasharray="160.8 643.4" stroke-dashoffset="-643.4"/></g>
    <text x="330" y="334" text-anchor="middle" fill="#12002B" font-size="23" font-weight="700">Due today</text><text x="330" y="378" text-anchor="middle" fill="#873EFF" font-size="40" font-weight="700">$50</text>
    <rect x="590" y="237" width="460" height="106" rx="20" fill="#F0E9FF"/><rect x="620" y="263" width="26" height="54" rx="8" fill="#873EFF"/><text x="674" y="278" fill="#12002B" font-size="22" font-weight="700">First recurring period</text><text x="674" y="312" fill="#5B476F" font-size="19">$40 · 80% of today's total</text>
    <rect x="590" y="363" width="460" height="106" rx="20" fill="#FFF1E3"/><rect x="620" y="389" width="26" height="54" rx="8" fill="#FE8218"/><text x="674" y="404" fill="#12002B" font-size="22" font-weight="700">One-time sign-up fee</text><text x="674" y="438" fill="#5B476F" font-size="19">$10 · 20% of today's total</text>
    <text x="600" y="582" text-anchor="middle" fill="#5B476F" font-size="17">Real checkout totals can also include tax, shipping, coupons, and a delayed recurring charge after a trial.</text>
  </g>
</svg>
