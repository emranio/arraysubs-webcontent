<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Subscription product model decision tree</title>
  <desc id="desc">A decision tree that distinguishes lifetime, prepaid, open-ended, fixed-term recurring, and installment models.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3 0 6z" fill="#873EFF"/></marker></defs>
  <rect width="1200" height="760" fill="#FAF8FF"/>
  <g font-family="Arial, sans-serif">
    <text x="60" y="66" fill="#12002B" font-size="38" font-weight="700">Choose the payment promise first</text>
    <text x="60" y="102" fill="#5B476F" font-size="19">The billing interval comes after the commercial model.</text>
    <rect x="390" y="142" width="420" height="82" rx="20" fill="#12002B"/>
    <text x="600" y="176" text-anchor="middle" fill="#fff" font-size="21" font-weight="700">Will the customer be charged again</text><text x="600" y="203" text-anchor="middle" fill="#DCCFF0" font-size="18">after checkout?</text>
    <path d="M505 224v55H252v48M695 224v55h253v48" fill="none" stroke="#873EFF" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="380" y="270" fill="#18A554" font-size="18" font-weight="700">NO</text><text x="806" y="270" fill="#873EFF" font-size="18" font-weight="700">YES</text>
    <rect x="80" y="327" width="345" height="74" rx="18" fill="#E9F7EF" stroke="#8AD0A8" stroke-width="2"/><text x="252" y="358" text-anchor="middle" fill="#12002B" font-size="19" font-weight="700">Does access have a fixed end?</text><text x="252" y="383" text-anchor="middle" fill="#5B476F" font-size="16">No further charge is scheduled</text>
    <rect x="775" y="327" width="345" height="74" rx="18" fill="#F0E9FF" stroke="#BFA8EA" stroke-width="2"/><text x="948" y="358" text-anchor="middle" fill="#12002B" font-size="19" font-weight="700">Is the charge count predetermined?</text><text x="948" y="383" text-anchor="middle" fill="#5B476F" font-size="16">Future payments are expected</text>
    <path d="M190 401v66M315 401v66M870 401v66M1025 401v66" stroke="#873EFF" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="165" y="446" fill="#873EFF" font-size="15" font-weight="700">YES</text><text x="290" y="446" fill="#873EFF" font-size="15" font-weight="700">NO</text><text x="840" y="446" fill="#873EFF" font-size="15" font-weight="700">NO</text><text x="995" y="446" fill="#873EFF" font-size="15" font-weight="700">YES</text>
    <rect x="60" y="470" width="260" height="112" rx="20" fill="#fff" stroke="#18A554" stroke-width="3"/><text x="190" y="510" text-anchor="middle" fill="#18A554" font-size="23" font-weight="700">Prepaid term</text><text x="190" y="541" text-anchor="middle" fill="#5B476F" font-size="16">Full term paid upfront</text><text x="190" y="565" text-anchor="middle" fill="#5B476F" font-size="16">access/delivery ends later</text>
    <rect x="340" y="470" width="260" height="112" rx="20" fill="#fff" stroke="#12002B" stroke-width="3"/><text x="470" y="510" text-anchor="middle" fill="#12002B" font-size="23" font-weight="700">Lifetime</text><text x="470" y="541" text-anchor="middle" fill="#5B476F" font-size="16">One payment</text><text x="470" y="565" text-anchor="middle" fill="#5B476F" font-size="16">no renewal</text>
    <rect x="620" y="470" width="260" height="112" rx="20" fill="#fff" stroke="#873EFF" stroke-width="3"/><text x="750" y="510" text-anchor="middle" fill="#873EFF" font-size="23" font-weight="700">Open-ended</text><text x="750" y="541" text-anchor="middle" fill="#5B476F" font-size="16">Charge each period</text><text x="750" y="565" text-anchor="middle" fill="#5B476F" font-size="16">until cancellation</text>
    <rect x="900" y="470" width="260" height="112" rx="20" fill="#fff" stroke="#FE8218" stroke-width="3"/><text x="1030" y="510" text-anchor="middle" fill="#FE8218" font-size="23" font-weight="700">Fixed-term</text><text x="1030" y="541" text-anchor="middle" fill="#5B476F" font-size="16">N recurring charges</text><text x="1030" y="565" text-anchor="middle" fill="#5B476F" font-size="16">then expire</text>
    <path d="M1030 582v42" stroke="#873EFF" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="820" y="627" width="340" height="72" rx="18" fill="#FFF1E3" stroke="#F6BD80" stroke-width="2"/><text x="990" y="656" text-anchor="middle" fill="#12002B" font-size="18" font-weight="700">Is it a fixed balance owed?</text><text x="990" y="681" text-anchor="middle" fill="#5B476F" font-size="16">Use a genuine installment tool</text>
    <rect x="60" y="628" width="680" height="72" rx="18" fill="#F5F2F8"/><text x="90" y="657" fill="#12002B" font-size="18" font-weight="700">Next question:</text><text x="225" y="657" fill="#5B476F" font-size="18">Does delivery run on the same clock as payment?</text><text x="90" y="684" fill="#5B476F" font-size="16">If not, define and test a separate fulfillment schedule.</text>
  </g>
</svg>
