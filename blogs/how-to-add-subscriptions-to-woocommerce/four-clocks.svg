<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">The four subscription clocks</title><desc id="desc">A swimlane diagram for billing, access, fulfillment, and recovery across signup, renewal, failure, and end.</desc>
  <rect width="1200" height="760" fill="#FAF8FF"/>
  <g font-family="Arial, sans-serif">
    <text x="60" y="66" fill="#12002B" font-size="38" font-weight="700">Map four clocks, not one billing date</text><text x="60" y="104" fill="#5B476F" font-size="19">Each lane needs an owner, a trigger, and proof.</text>
    <g fill="#5B476F" font-size="16" font-weight="700"><text x="300" y="158" text-anchor="middle">SIGNUP</text><text x="545" y="158" text-anchor="middle">RENEWAL</text><text x="790" y="158" text-anchor="middle">FAILURE / GRACE</text><text x="1030" y="158" text-anchor="middle">END OR REPEAT</text></g>
    <g stroke="#DED2F4"><line x1="240" y1="180" x2="240" y2="672"/><line x1="420" y1="180" x2="420" y2="672"/><line x1="670" y1="180" x2="670" y2="672"/><line x1="915" y1="180" x2="915" y2="672"/><line x1="1135" y1="180" x2="1135" y2="672"/></g>
    <rect x="60" y="190" width="1080" height="105" rx="20" fill="#F0E9FF"/><text x="90" y="230" fill="#873EFF" font-size="22" font-weight="700">Billing</text><text x="90" y="259" fill="#5B476F" font-size="16">When money is due</text><circle cx="300" cy="242" r="14" fill="#873EFF"/><path d="M314 242H520" stroke="#873EFF" stroke-width="6" stroke-linecap="round"/><circle cx="545" cy="242" r="14" fill="#873EFF"/><path d="M559 242H1010" stroke="#873EFF" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 12"/><circle cx="1030" cy="242" r="14" fill="#873EFF"/>
    <rect x="60" y="315" width="1080" height="105" rx="20" fill="#E9F7EF"/><text x="90" y="355" fill="#18A554" font-size="22" font-weight="700">Access</text><text x="90" y="384" fill="#5B476F" font-size="16">What the customer may use</text><circle cx="300" cy="367" r="14" fill="#18A554"/><path d="M314 367H775" stroke="#18A554" stroke-width="6" stroke-linecap="round"/><path d="M804 367H1010" stroke="#18A554" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 12"/><circle cx="790" cy="367" r="18" fill="#fff" stroke="#18A554" stroke-width="5"/><circle cx="1030" cy="367" r="14" fill="#18A554"/>
    <rect x="60" y="440" width="1080" height="105" rx="20" fill="#FFF1E3"/><text x="90" y="480" fill="#FE8218" font-size="22" font-weight="700">Fulfillment</text><text x="90" y="509" fill="#5B476F" font-size="16">What is delivered</text><circle cx="300" cy="492" r="14" fill="#FE8218"/><path d="M314 492H520" stroke="#FE8218" stroke-width="6" stroke-linecap="round"/><circle cx="545" cy="492" r="14" fill="#FE8218"/><path d="M559 492H1010" stroke="#FE8218" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 12"/><circle cx="1030" cy="492" r="14" fill="#FE8218"/>
    <rect x="60" y="565" width="1080" height="105" rx="20" fill="#F5F2F8"/><text x="90" y="605" fill="#12002B" font-size="22" font-weight="700">Recovery</text><text x="90" y="634" fill="#5B476F" font-size="16">Retry, notice, grace, stop</text><path d="M545 617H770" stroke="#12002B" stroke-width="6" stroke-linecap="round"/><circle cx="790" cy="617" r="14" fill="#12002B"/><path d="M804 617H1010" stroke="#12002B" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 12"/><circle cx="1030" cy="617" r="14" fill="#12002B"/>
    <text x="600" y="718" text-anchor="middle" fill="#5B476F" font-size="17">The lanes may share dates, but never assume they share rules.</text>
  </g>
</svg>
