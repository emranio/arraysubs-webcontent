<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="690" viewBox="0 0 1200 690" role="img" aria-labelledby="title desc">
  <title id="title">Illustrative six-month payment timing</title><desc id="desc">Grouped bars compare six 25 dollar payments with one 150 dollar prepaid charge.</desc>
  <rect width="1200" height="690" fill="#FAF8FF"/>
  <g font-family="Arial, sans-serif">
    <text x="60" y="66" fill="#12002B" font-size="38" font-weight="700">$150 over six months: two truthful models</text><text x="60" y="103" fill="#5B476F" font-size="19">Illustrative cash timing only · no profit or conversion claim</text>
    <rect x="60" y="145" width="1080" height="450" rx="26" fill="#fff" stroke="#DED2F4" stroke-width="2"/>
    <line x1="175" y1="205" x2="175" y2="530" stroke="#9B8CAA" stroke-width="2"/><line x1="175" y1="530" x2="1080" y2="530" stroke="#9B8CAA" stroke-width="2"/>
    <g stroke="#E8E0F4"><line x1="175" y1="422" x2="1080" y2="422"/><line x1="175" y1="314" x2="1080" y2="314"/><line x1="175" y1="206" x2="1080" y2="206"/></g>
    <g fill="#5B476F" font-size="15"><text x="150" y="535" text-anchor="end">$0</text><text x="150" y="427" text-anchor="end">$50</text><text x="150" y="319" text-anchor="end">$100</text><text x="150" y="211" text-anchor="end">$150</text></g>
    <g fill="#873EFF"><rect x="230" y="476" width="45" height="54" rx="7"/><rect x="375" y="476" width="45" height="54" rx="7"/><rect x="520" y="476" width="45" height="54" rx="7"/><rect x="665" y="476" width="45" height="54" rx="7"/><rect x="810" y="476" width="45" height="54" rx="7"/><rect x="955" y="476" width="45" height="54" rx="7"/></g>
    <g fill="#18A554"><rect x="282" y="206" width="45" height="324" rx="7"/><rect x="427" y="526" width="45" height="4" rx="2"/><rect x="572" y="526" width="45" height="4" rx="2"/><rect x="717" y="526" width="45" height="4" rx="2"/><rect x="862" y="526" width="45" height="4" rx="2"/><rect x="1007" y="526" width="45" height="4" rx="2"/></g>
    <g fill="#12002B" font-size="15" font-weight="700"><text x="252" y="464" text-anchor="middle">$25</text><text x="397" y="464" text-anchor="middle">$25</text><text x="542" y="464" text-anchor="middle">$25</text><text x="687" y="464" text-anchor="middle">$25</text><text x="832" y="464" text-anchor="middle">$25</text><text x="977" y="464" text-anchor="middle">$25</text><text x="304" y="194" text-anchor="middle">$150</text></g>
    <g fill="#5B476F" font-size="15"><text x="278" y="562" text-anchor="middle">Checkout</text><text x="423" y="562" text-anchor="middle">Month 2</text><text x="568" y="562" text-anchor="middle">Month 3</text><text x="713" y="562" text-anchor="middle">Month 4</text><text x="858" y="562" text-anchor="middle">Month 5</text><text x="1003" y="562" text-anchor="middle">Month 6</text></g>
    <rect x="250" y="625" width="18" height="18" rx="4" fill="#873EFF"/><text x="280" y="640" fill="#12002B" font-size="17">Pay each cycle · $25 × 6</text><rect x="615" y="625" width="18" height="18" rx="4" fill="#18A554"/><text x="645" y="640" fill="#12002B" font-size="17">Prepaid · $150 at checkout</text>
  </g>
</svg>
