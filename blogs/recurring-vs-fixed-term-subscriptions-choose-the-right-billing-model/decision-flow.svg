  <text x="72" y="178" fill="#5a4775" font-family="Arial, sans-serif" font-size="17">Decision path — read from left to right</text>
  <path d="M 319 370 H 344" stroke="#160033" stroke-width="4" stroke-linecap="round"/><path d="M 332 358 L 344 370 L 332 382" fill="none" stroke="#160033" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><rect x="87" y="300" width="225" height="140" rx="22" fill="#eee7ff" stroke="#7c3cff" stroke-width="2"/><circle cx="115" cy="330" r="15" fill="#7c3cff"/><text x="115" y="336" text-anchor="middle" fill="white" font-family="Arial" font-size="15" font-weight="700">1</text><foreignObject x="107" y="355" width="185" height="70"><div xmlns="http://www.w3.org/1999/xhtml" style="font:700 18px Arial;color:#160033;line-height:1.25;text-align:center">Continues until cancellation</div></foreignObject><path d="M 586 370 H 611" stroke="#160033" stroke-width="4" stroke-linecap="round"/><path d="M 599 358 L 611 370 L 599 382" fill="none" stroke="#160033" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><rect x="354" y="300" width="225" height="140" rx="22" fill="#fff0e4" stroke="#ff7a1a" stroke-width="2"/><circle cx="382" cy="330" r="15" fill="#ff7a1a"/><text x="382" y="336" text-anchor="middle" fill="white" font-family="Arial" font-size="15" font-weight="700">2</text><foreignObject x="374" y="355" width="185" height="70"><div xmlns="http://www.w3.org/1999/xhtml" style="font:700 18px Arial;color:#160033;line-height:1.25;text-align:center">Ongoing recurring</div></foreignObject><path d="M 853 370 H 878" stroke="#160033" stroke-width="4" stroke-linecap="round"/><path d="M 866 358 L 878 370 L 866 382" fill="none" stroke="#160033" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><rect x="621" y="300" width="225" height="140" rx="22" fill="#e6f7ed" stroke="#16a75c" stroke-width="2"/><circle cx="649" cy="330" r="15" fill="#16a75c"/><text x="649" y="336" text-anchor="middle" fill="white" font-family="Arial" font-size="15" font-weight="700">3</text><foreignObject x="641" y="355" width="185" height="70"><div xmlns="http://www.w3.org/1999/xhtml" style="font:700 18px Arial;color:#160033;line-height:1.25;text-align:center">Defined payment count</div></foreignObject><rect x="888" y="300" width="225" height="140" rx="22" fill="#eee7ff" stroke="#7c3cff" stroke-width="2"/><circle cx="916" cy="330" r="15" fill="#7c3cff"/><text x="916" y="336" text-anchor="middle" fill="white" font-family="Arial" font-size="15" font-weight="700">4</text><foreignObject x="908" y="355" width="185" height="70"><div xmlns="http://www.w3.org/1999/xhtml" style="font:700 18px Arial;color:#160033;line-height:1.25;text-align:center">Fixed-cycle recurring</div></foreignObject><rect x="310" y="535" width="580" height="64" rx="32" fill="#160033"/><text x="600" y="574" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="700">Make the customer promise explicit before configuration</text>
