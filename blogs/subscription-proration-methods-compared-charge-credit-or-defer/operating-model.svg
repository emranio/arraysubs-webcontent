<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Proration decides who keeps unused value: operating model</title>
  <desc id="desc">Three responsibilities the subscription team must make explicit</desc>
  <rect width="1200" height="700" rx="36" fill="#fbf9ff"/>
  <rect x="32" y="32" width="1136" height="636" rx="28" fill="none" stroke="#d8c8f4" stroke-width="2"/>
  <text x="72" y="92" fill="#7c3cff" font-family="Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="2">ARRAYSUBS FIELD GUIDE</text>
  <text x="72" y="142" fill="#160033" font-family="Arial, sans-serif" font-size="34" font-weight="700">Proration decides who keeps unused value: operating model</text>
  <text x="72" y="178" fill="#5a4775" font-family="Arial, sans-serif" font-size="17">Three responsibilities the subscription team must make explicit</text>
  <rect x="80" y="280" width="315" height="250" rx="26" fill="#eee7ff" stroke="#7c3cff" stroke-width="2"/><circle cx="128" cy="330" r="26" fill="#7c3cff"/><text x="128" y="338" text-anchor="middle" fill="white" font-family="Arial" font-size="22" font-weight="700">1</text><text x="166" y="338" fill="#160033" font-family="Arial" font-size="24" font-weight="700">Charge</text><foreignObject x="108" y="380" width="259" height="100"><div xmlns="http://www.w3.org/1999/xhtml" style="font:18px Arial;color:#5a4775;line-height:1.45">Collect the new-period difference</div></foreignObject><rect x="445" y="280" width="315" height="250" rx="26" fill="#fff0e4" stroke="#ff7a1a" stroke-width="2"/><circle cx="493" cy="330" r="26" fill="#ff7a1a"/><text x="493" y="338" text-anchor="middle" fill="white" font-family="Arial" font-size="22" font-weight="700">2</text><text x="531" y="338" fill="#160033" font-family="Arial" font-size="24" font-weight="700">Credit</text><foreignObject x="473" y="380" width="259" height="100"><div xmlns="http://www.w3.org/1999/xhtml" style="font:18px Arial;color:#5a4775;line-height:1.45">Return unused paid value</div></foreignObject><rect x="810" y="280" width="315" height="250" rx="26" fill="#e6f7ed" stroke="#16a75c" stroke-width="2"/><circle cx="858" cy="330" r="26" fill="#16a75c"/><text x="858" y="338" text-anchor="middle" fill="white" font-family="Arial" font-size="22" font-weight="700">3</text><text x="896" y="338" fill="#160033" font-family="Arial" font-size="24" font-weight="700">Defer</text><foreignObject x="838" y="380" width="259" height="100"><div xmlns="http://www.w3.org/1999/xhtml" style="font:18px Arial;color:#5a4775;line-height:1.45">Change at the next boundary</div></foreignObject><circle cx="600" cy="590" r="18" fill="#160033"/><path d="M 566 652 Q 570 610 600 610 Q 630 610 634 652" fill="#160033"/><path d="M 576 624 L 540 600 M 624 624 L 660 600" stroke="#160033" stroke-width="9" stroke-linecap="round"/>
</svg>