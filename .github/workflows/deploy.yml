name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Reload on Server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            export PATH="$HOME/.bun/bin:$PATH"
            export BUN_INSTALL="$HOME/.bun"

            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> Syncing latest code"
            git fetch --prune origin main
            git reset --hard "${{ github.sha }}"

            echo "==> Copying .env.production to .env"
            cp .env.production .env

            echo "==> Installing dependencies"
            bun install --frozen-lockfile

            echo "==> Cleaning previous Next.js build output"
            rm -rf .next

            echo "==> Building"
            bun run build

            echo "==> Reloading PM2"
            pm2 startOrReload ecosystem.config.cjs --env production --update-env

            echo "==> Checking local app health"
            APP_PORT="$(sed -n 's/^PORT=//p' .env | tail -1)"
            APP_PORT="${APP_PORT:-3000}"
            for attempt in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${APP_PORT}/" >/dev/null; then
                break
              fi

              if [ "$attempt" -eq 30 ]; then
                pm2 logs arrayhash-com-next --lines 80 --nostream
                exit 1
              fi

              sleep 1
            done

            pm2 save

            echo "==> Done"

      - name: Purge Cloudflare Cache
        run: |
          curl -s -X POST "${{ secrets.CF_PURGE_CACHE_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
