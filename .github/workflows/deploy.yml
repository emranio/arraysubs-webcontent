name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: arrayhash-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Reload on Server
    runs-on: ubuntu-latest

    steps:
      # Zero-downtime: deploy.sh builds an isolated release under
      # .deploy/releases/, atomically switches the .deploy/current symlink,
      # and graceful-reloads PM2 in cluster mode. Rollback and release
      # pruning live in deploy.sh so the flow is identical for manual runs.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --prune origin main
            git reset --hard "${{ github.sha }}"
            chmod +x deploy.sh
            TARGET_SHA="${{ github.sha }}" ./deploy.sh

      - name: Purge Cloudflare Cache
        run: |
          curl --fail-with-body --silent --show-error -X POST "${{ secrets.CF_PURGE_CACHE_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      - name: Verify Public Site
        run: |
          set -euo pipefail

          for path in / /deals/arraysubs/; do
            url="https://arrayhash.com${path}"
            healthy=0

            for attempt in $(seq 1 30); do
              if curl -fsS --max-time 10 -H "Cache-Control: no-cache" "$url" >/dev/null; then
                healthy=1
                break
              fi
              sleep 2
            done

            if [ "$healthy" -ne 1 ]; then
              echo "Public health check failed: $url" >&2
              exit 1
            fi
          done
