<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Subscription launch test path</title><desc id="desc">Six-step flow from sandbox checkout through parent order, portal, renewal, failure test, and monitoring.</desc>
  <rect width="1200" height="560" fill="#FAF8FF"/>
  <g font-family="Arial, sans-serif">
    <text x="60" y="68" fill="#12002B" font-size="38" font-weight="700">Launch only after the complete loop passes</text><text x="60" y="105" fill="#5B476F" font-size="19">Collect one visible proof artifact at every step.</text>
    <path d="M155 270H1045" stroke="#BFA8EA" stroke-width="8" stroke-linecap="round"/>
    <g text-anchor="middle">
      <g transform="translate(155 270)"><circle r="52" fill="#873EFF"/><text y="8" fill="#fff" font-size="25" font-weight="700">1</text><text y="92" fill="#12002B" font-size="18" font-weight="700">Sandbox</text><text y="116" fill="#5B476F" font-size="15">checkout</text></g>
      <g transform="translate(333 270)"><circle r="52" fill="#873EFF"/><text y="8" fill="#fff" font-size="25" font-weight="700">2</text><text y="92" fill="#12002B" font-size="18" font-weight="700">Parent order</text><text y="116" fill="#5B476F" font-size="15">+ agreement</text></g>
      <g transform="translate(511 270)"><circle r="52" fill="#873EFF"/><text y="8" fill="#fff" font-size="25" font-weight="700">3</text><text y="92" fill="#12002B" font-size="18" font-weight="700">Portal</text><text y="116" fill="#5B476F" font-size="15">customer view</text></g>
      <g transform="translate(689 270)"><circle r="52" fill="#18A554"/><text y="8" fill="#fff" font-size="25" font-weight="700">4</text><text y="92" fill="#12002B" font-size="18" font-weight="700">Renewal</text><text y="116" fill="#5B476F" font-size="15">forced safely</text></g>
      <g transform="translate(867 270)"><circle r="52" fill="#FE8218"/><text y="8" fill="#fff" font-size="25" font-weight="700">5</text><text y="92" fill="#12002B" font-size="18" font-weight="700">Failure</text><text y="116" fill="#5B476F" font-size="15">recovery path</text></g>
      <g transform="translate(1045 270)"><circle r="52" fill="#12002B"/><text y="8" fill="#fff" font-size="25" font-weight="700">6</text><text y="92" fill="#12002B" font-size="18" font-weight="700">Monitoring</text><text y="116" fill="#5B476F" font-size="15">logs + queue</text></g>
    </g>
    <g fill="#E9F7EF"><rect x="94" y="430" width="122" height="40" rx="20"/><rect x="272" y="430" width="122" height="40" rx="20"/><rect x="450" y="430" width="122" height="40" rx="20"/><rect x="628" y="430" width="122" height="40" rx="20"/><rect x="806" y="430" width="122" height="40" rx="20"/><rect x="984" y="430" width="122" height="40" rx="20"/></g>
    <g fill="#18A554" font-size="14" font-weight="700" text-anchor="middle"><text x="155" y="455">TERMS</text><text x="333" y="455">RECORDS</text><text x="511" y="455">ACTIONS</text><text x="689" y="455">PAID ORDER</text><text x="867" y="455">STATE</text><text x="1045" y="455">EVIDENCE</text></g>
  </g>
</svg>
