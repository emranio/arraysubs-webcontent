<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Three-axis subscription product taxonomy</title><desc id="desc">Catalog structure multiplied by payment promise and what the customer receives.</desc>
  <rect width="1200" height="660" fill="#FAF8FF"/>
  <g font-family="Arial, sans-serif">
    <text x="60" y="66" fill="#12002B" font-size="38" font-weight="700">Three decisions make a subscription product</text><text x="60" y="103" fill="#5B476F" font-size="19">Choose one answer from each column.</text>
    <rect x="60" y="150" width="320" height="390" rx="28" fill="#F0E9FF" stroke="#BFA8EA" stroke-width="2"/><circle cx="110" cy="202" r="24" fill="#873EFF"/><text x="110" y="210" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">1</text><text x="148" y="210" fill="#12002B" font-size="24" font-weight="700">Catalog structure</text>
    <g fill="#fff"><rect x="95" y="252" width="250" height="54" rx="14"/><rect x="95" y="320" width="250" height="54" rx="14"/><rect x="95" y="388" width="250" height="54" rx="14"/><rect x="95" y="456" width="250" height="54" rx="14"/></g><g fill="#3F2A5C" font-size="18" font-weight="700"><text x="120" y="286">Simple</text><text x="120" y="354">Variable</text><text x="120" y="422">Bundle</text><text x="120" y="490">Composite</text></g>
    <text x="410" y="356" fill="#873EFF" font-size="44" font-weight="700">×</text>
    <rect x="440" y="150" width="320" height="390" rx="28" fill="#FFF1E3" stroke="#F6BD80" stroke-width="2"/><circle cx="490" cy="202" r="24" fill="#FE8218"/><text x="490" y="210" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">2</text><text x="528" y="210" fill="#12002B" font-size="24" font-weight="700">Payment promise</text>
    <g fill="#fff"><rect x="475" y="238" width="250" height="48" rx="14"/><rect x="475" y="298" width="250" height="48" rx="14"/><rect x="475" y="358" width="250" height="48" rx="14"/><rect x="475" y="418" width="250" height="48" rx="14"/><rect x="475" y="478" width="250" height="48" rx="14"/></g><g fill="#3F2A5C" font-size="17" font-weight="700"><text x="500" y="268">Ongoing</text><text x="500" y="328">Fixed-cycle</text><text x="500" y="388">Prepaid</text><text x="500" y="448">Installment</text><text x="500" y="508">Lifetime</text></g>
    <text x="790" y="356" fill="#873EFF" font-size="44" font-weight="700">×</text>
    <rect x="820" y="150" width="320" height="390" rx="28" fill="#E9F7EF" stroke="#8AD0A8" stroke-width="2"/><circle cx="870" cy="202" r="24" fill="#18A554"/><text x="870" y="210" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">3</text><text x="908" y="210" fill="#12002B" font-size="24" font-weight="700">What is delivered</text>
    <g fill="#fff"><rect x="855" y="252" width="250" height="54" rx="14"/><rect x="855" y="320" width="250" height="54" rx="14"/><rect x="855" y="388" width="250" height="54" rx="14"/><rect x="855" y="456" width="250" height="54" rx="14"/></g><g fill="#3F2A5C" font-size="18" font-weight="700"><text x="880" y="286">Physical goods</text><text x="880" y="354">Downloads</text><text x="880" y="422">Services</text><text x="880" y="490">Membership access</text></g>
    <rect x="240" y="575" width="720" height="48" rx="24" fill="#12002B"/><text x="600" y="606" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Example: Variable × Ongoing × Physical goods = monthly or annual box sizes</text>
  </g>
</svg>
