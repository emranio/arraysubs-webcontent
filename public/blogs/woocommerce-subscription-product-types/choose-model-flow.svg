<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Choose a subscription product model</title><desc id="desc">Flowchart choosing simple or variable structure and ongoing, fixed-cycle, prepaid, installment, or lifetime payment terms.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3 0 6z" fill="#873EFF"/></marker></defs>
  <rect width="1200" height="820" fill="#FAF8FF"/>
  <g font-family="Arial, sans-serif">
    <text x="60" y="64" fill="#12002B" font-size="38" font-weight="700">Choose the smallest model that tells the truth</text><text x="60" y="101" fill="#5B476F" font-size="19">Structure first, then payment promise, then fulfillment.</text>
    <circle cx="135" cy="180" r="38" fill="#12002B"/><circle cx="135" cy="169" r="10" fill="#fff"/><path d="M115 199c5-15 35-15 40 0" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <rect x="220" y="135" width="450" height="90" rx="20" fill="#F0E9FF" stroke="#BFA8EA" stroke-width="2"/><text x="445" y="171" text-anchor="middle" fill="#12002B" font-size="20" font-weight="700">Does the customer choose meaningful tiers,</text><text x="445" y="199" text-anchor="middle" fill="#12002B" font-size="20" font-weight="700">sizes, or schedules on one page?</text>
    <path d="M670 180h150v-45h105M670 180h150v90h105" fill="none" stroke="#873EFF" stroke-width="3" marker-end="url(#a)"/><text x="770" y="165" fill="#18A554" font-size="16" font-weight="700">NO</text><text x="770" y="260" fill="#873EFF" font-size="16" font-weight="700">YES</text>
    <rect x="930" y="100" width="210" height="70" rx="18" fill="#E9F7EF"/><text x="1035" y="142" text-anchor="middle" fill="#12002B" font-size="21" font-weight="700">Simple product</text><rect x="930" y="235" width="210" height="70" rx="18" fill="#873EFF"/><text x="1035" y="277" text-anchor="middle" fill="#fff" font-size="21" font-weight="700">Variable product</text>
    <path d="M445 225v100" stroke="#873EFF" stroke-width="3" marker-end="url(#a)"/>
    <rect x="220" y="330" width="450" height="82" rx="20" fill="#12002B"/><text x="445" y="364" text-anchor="middle" fill="#fff" font-size="21" font-weight="700">Will the customer be charged again?</text><text x="445" y="390" text-anchor="middle" fill="#DCCFF0" font-size="16">after checkout</text>
    <path d="M320 412v65H150v55M570 412v65h240v55" fill="none" stroke="#873EFF" stroke-width="3" marker-end="url(#a)"/><text x="245" y="465" fill="#18A554" font-size="16" font-weight="700">NO</text><text x="695" y="465" fill="#873EFF" font-size="16" font-weight="700">YES</text>
    <rect x="55" y="535" width="265" height="90" rx="20" fill="#E9F7EF"/><text x="188" y="569" text-anchor="middle" fill="#12002B" font-size="20" font-weight="700">Fixed end?</text><text x="188" y="596" text-anchor="middle" fill="#5B476F" font-size="16">prepaid or lifetime</text>
    <rect x="665" y="535" width="290" height="90" rx="20" fill="#F0E9FF"/><text x="810" y="569" text-anchor="middle" fill="#12002B" font-size="20" font-weight="700">Does value continue</text><text x="810" y="596" text-anchor="middle" fill="#5B476F" font-size="16">until cancellation?</text>
    <path d="M188 625v55M740 625v55M880 625v55" stroke="#873EFF" stroke-width="3" marker-end="url(#a)"/>
    <rect x="55" y="684" width="265" height="78" rx="18" fill="#fff" stroke="#18A554" stroke-width="3"/><text x="188" y="716" text-anchor="middle" fill="#12002B" font-size="20" font-weight="700">Prepaid / Lifetime</text><text x="188" y="742" text-anchor="middle" fill="#5B476F" font-size="15">separate access delivery</text>
    <rect x="590" y="684" width="260" height="78" rx="18" fill="#fff" stroke="#873EFF" stroke-width="3"/><text x="720" y="716" text-anchor="middle" fill="#873EFF" font-size="20" font-weight="700">Ongoing recurring</text><text x="720" y="742" text-anchor="middle" fill="#5B476F" font-size="15">until cancellation</text>
    <rect x="880" y="684" width="260" height="78" rx="18" fill="#fff" stroke="#FE8218" stroke-width="3"/><text x="1010" y="716" text-anchor="middle" fill="#FE8218" font-size="20" font-weight="700">Fixed-cycle</text><text x="1010" y="742" text-anchor="middle" fill="#5B476F" font-size="15">or installment if balance owed</text>
    <text x="145" y="673" fill="#18A554" font-size="15" font-weight="700">ONE PAYMENT</text><text x="690" y="673" fill="#873EFF" font-size="15" font-weight="700">YES</text><text x="940" y="673" fill="#FE8218" font-size="15" font-weight="700">NO</text>
    <rect x="420" y="555" width="170" height="50" rx="25" fill="#FFF1E3"/><text x="505" y="586" text-anchor="middle" fill="#12002B" font-size="15" font-weight="700">Map delivery next</text>
  </g>
</svg>
