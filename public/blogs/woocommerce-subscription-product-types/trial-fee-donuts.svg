<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Trial and sign-up fee checkout examples</title><desc id="desc">Two donut charts compare a 275 dollar checkout without a trial and a 200 dollar checkout with a trial.</desc>
  <rect width="1200" height="650" fill="#FAF8FF"/>
  <g font-family="Arial, sans-serif">
    <text x="60" y="66" fill="#12002B" font-size="38" font-weight="700">A trial delays the recurring charge—not the fee</text><text x="60" y="103" fill="#5B476F" font-size="19">Worked example with a $75 recurring price and $200 sign-up fee</text>
    <rect x="60" y="145" width="520" height="430" rx="28" fill="#fff" stroke="#DED2F4" stroke-width="2"/><text x="320" y="190" text-anchor="middle" fill="#12002B" font-size="23" font-weight="700">No free trial</text><g transform="translate(320 355) rotate(-90)"><circle r="105" fill="none" stroke="#F0E9FF" stroke-width="52"/><circle r="105" fill="none" stroke="#873EFF" stroke-width="52" stroke-dasharray="180 480"/><circle r="105" fill="none" stroke="#FE8218" stroke-width="52" stroke-dasharray="480 180" stroke-dashoffset="-180"/></g><text x="320" y="345" text-anchor="middle" fill="#12002B" font-size="18" font-weight="700">Due today</text><text x="320" y="384" text-anchor="middle" fill="#873EFF" font-size="34" font-weight="700">$275</text><rect x="145" y="508" width="15" height="15" rx="3" fill="#FE8218"/><text x="170" y="521" fill="#5B476F" font-size="15">$200 fee · 72.7%</text><rect x="345" y="508" width="15" height="15" rx="3" fill="#873EFF"/><text x="370" y="521" fill="#5B476F" font-size="15">$75 period · 27.3%</text>
    <rect x="620" y="145" width="520" height="430" rx="28" fill="#fff" stroke="#DED2F4" stroke-width="2"/><text x="880" y="190" text-anchor="middle" fill="#12002B" font-size="23" font-weight="700">With a free trial</text><g transform="translate(880 355) rotate(-90)"><circle r="105" fill="none" stroke="#FE8218" stroke-width="52"/></g><text x="880" y="345" text-anchor="middle" fill="#12002B" font-size="18" font-weight="700">Due today</text><text x="880" y="384" text-anchor="middle" fill="#FE8218" font-size="34" font-weight="700">$200</text><rect x="736" y="508" width="15" height="15" rx="3" fill="#FE8218"/><text x="761" y="521" fill="#5B476F" font-size="15">$200 fee · 100%</text><text x="880" y="552" text-anchor="middle" fill="#873EFF" font-size="15" font-weight="700">$75 recurring charge waits until trial end</text>
    <text x="600" y="618" text-anchor="middle" fill="#5B476F" font-size="16">Illustrative arithmetic only · actual checkout can also include tax, shipping, coupons, and gateway rules.</text>
  </g>
</svg>
