<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Illustrative operational complexity rubric</title><desc id="desc">Horizontal bars show a planning score for simple recurring, variable recurring, prepaid physical, and installment models.</desc>
  <rect width="1200" height="680" fill="#FAF8FF"/>
  <g font-family="Arial, sans-serif">
    <text x="60" y="66" fill="#12002B" font-size="38" font-weight="700">Every added dimension creates another test path</text><text x="60" y="103" fill="#5B476F" font-size="19">Editorial planning rubric · not measured store performance</text>
    <rect x="60" y="145" width="1080" height="430" rx="28" fill="#fff" stroke="#DED2F4" stroke-width="2"/>
    <g fill="#12002B" font-size="18" font-weight="700"><text x="100" y="225">Simple ongoing</text><text x="100" y="320">Variable ongoing</text><text x="100" y="415">Prepaid physical</text><text x="100" y="510">Installment balance</text></g>
    <g fill="#F0E9FF"><rect x="350" y="190" width="680" height="48" rx="12"/><rect x="350" y="285" width="680" height="48" rx="12"/><rect x="350" y="380" width="680" height="48" rx="12"/><rect x="350" y="475" width="680" height="48" rx="12"/></g>
    <rect x="350" y="190" width="204" height="48" rx="12" fill="#18A554"/><rect x="350" y="285" width="374" height="48" rx="12" fill="#873EFF"/><rect x="350" y="380" width="510" height="48" rx="12" fill="#FE8218"/><rect x="350" y="475" width="612" height="48" rx="12" fill="#12002B"/>
    <g fill="#fff" font-size="17" font-weight="700"><text x="525" y="221" text-anchor="end">3 / 10</text><text x="695" y="316" text-anchor="end">5.5 / 10</text><text x="831" y="411" text-anchor="end">7.5 / 10</text><text x="933" y="506" text-anchor="end">9 / 10</text></g>
    <g fill="#5B476F" font-size="14"><text x="350" y="550">LOWER: one offer + one schedule</text><text x="1030" y="550" text-anchor="end">HIGHER: choices + separate schedules + balance rules</text></g>
    <rect x="175" y="608" width="850" height="42" rx="21" fill="#F0E9FF"/><text x="600" y="635" text-anchor="middle" fill="#3F2A5C" font-size="16" font-weight="700">Use the score to plan testing—not to predict revenue, conversion, or customer preference.</text>
  </g>
</svg>
