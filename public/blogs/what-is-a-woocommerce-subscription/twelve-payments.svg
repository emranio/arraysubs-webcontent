<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Twelve total subscription payments</title><desc id="desc">A timeline with one parent-order payment at signup followed by eleven renewal-order payments and expiration.</desc>
  <rect width="1200" height="560" fill="#FAF8FF"/>
  <g font-family="Arial, sans-serif">
    <text x="60" y="68" fill="#12002B" font-size="38" font-weight="700">12 total payments = signup + 11 renewals</text><text x="60" y="105" fill="#5B476F" font-size="19">A finite monthly example with no trial and payment one collected at checkout.</text>
    <rect x="60" y="150" width="1080" height="285" rx="28" fill="#fff" stroke="#DED2F4" stroke-width="2"/>
    <path d="M120 280H1060" stroke="#DED2F4" stroke-width="10" stroke-linecap="round"/>
    <g text-anchor="middle"><circle cx="130" cy="280" r="34" fill="#873EFF"/><text x="130" y="288" fill="#fff" font-size="21" font-weight="700">1</text><text x="130" y="350" fill="#12002B" font-size="17" font-weight="700">Parent</text><text x="130" y="374" fill="#5B476F" font-size="14">signup</text></g>
    <g fill="#18A554" stroke="#fff" stroke-width="4"><circle cx="215" cy="280" r="25"/><circle cx="300" cy="280" r="25"/><circle cx="385" cy="280" r="25"/><circle cx="470" cy="280" r="25"/><circle cx="555" cy="280" r="25"/><circle cx="640" cy="280" r="25"/><circle cx="725" cy="280" r="25"/><circle cx="810" cy="280" r="25"/><circle cx="895" cy="280" r="25"/><circle cx="980" cy="280" r="25"/><circle cx="1065" cy="280" r="25"/></g>
    <g fill="#fff" font-size="15" font-weight="700" text-anchor="middle"><text x="215" y="286">2</text><text x="300" y="286">3</text><text x="385" y="286">4</text><text x="470" y="286">5</text><text x="555" y="286">6</text><text x="640" y="286">7</text><text x="725" y="286">8</text><text x="810" y="286">9</text><text x="895" y="286">10</text><text x="980" y="286">11</text><text x="1065" y="286">12</text></g>
    <text x="640" y="350" text-anchor="middle" fill="#18A554" font-size="18" font-weight="700">11 linked renewal orders</text><text x="640" y="378" text-anchor="middle" fill="#5B476F" font-size="15">one transaction record for each later payment</text>
    <rect x="925" y="450" width="215" height="54" rx="27" fill="#12002B"/><text x="1032" y="484" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">Then: Expired</text>
    <path d="M1065 435v15" stroke="#12002B" stroke-width="4"/>
  </g>
</svg>
