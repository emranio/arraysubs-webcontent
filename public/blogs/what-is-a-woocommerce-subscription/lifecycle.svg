<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">WooCommerce subscription lifecycle</title><desc id="desc">Lifecycle from configured offer through checkout, active subscription, renewal, automatic or manual payment, recovery, and end.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3 0 6z" fill="#873EFF"/></marker></defs>
  <rect width="1200" height="760" fill="#FAF8FF"/>
  <g font-family="Arial, sans-serif">
    <text x="60" y="66" fill="#12002B" font-size="38" font-weight="700">The agreement persists while orders accumulate</text><text x="60" y="103" fill="#5B476F" font-size="19">Follow the future schedule from the subscription, then inspect each transaction order.</text>
    <g text-anchor="middle" font-weight="700"><rect x="55" y="155" width="190" height="82" rx="18" fill="#F0E9FF"/><text x="150" y="188" fill="#12002B" font-size="19">Configure offer</text><text x="150" y="215" fill="#5B476F" font-size="15">product / plan</text><rect x="275" y="155" width="190" height="82" rx="18" fill="#12002B"/><text x="370" y="188" fill="#fff" font-size="19">Checkout</text><text x="370" y="215" fill="#DCCFF0" font-size="15">first transaction</text><rect x="495" y="155" width="250" height="82" rx="18" fill="#873EFF"/><text x="620" y="188" fill="#fff" font-size="19">Subscription active</text><text x="620" y="215" fill="#E9DEFF" font-size="15">next payment scheduled</text><rect x="775" y="155" width="190" height="82" rx="18" fill="#F0E9FF"/><text x="870" y="188" fill="#12002B" font-size="19">Renewal due</text><text x="870" y="215" fill="#5B476F" font-size="15">order created</text><rect x="995" y="155" width="150" height="82" rx="18" fill="#FFF1E3"/><text x="1070" y="188" fill="#12002B" font-size="19">Payment</text><text x="1070" y="215" fill="#5B476F" font-size="15">two paths</text></g>
    <g stroke="#873EFF" stroke-width="3" marker-end="url(#a)"><path d="M245 196h27"/><path d="M465 196h27"/><path d="M745 196h27"/><path d="M965 196h27"/></g>
    <path d="M1070 237v78H350v65" fill="none" stroke="#873EFF" stroke-width="3" marker-end="url(#a)"/><path d="M1070 315H850v65" fill="none" stroke="#873EFF" stroke-width="3" marker-end="url(#a)"/>
    <rect x="175" y="385" width="350" height="94" rx="20" fill="#E9F7EF" stroke="#8AD0A8" stroke-width="2"/><text x="350" y="421" text-anchor="middle" fill="#18A554" font-size="15" font-weight="700">AUTOMATIC</text><text x="350" y="450" text-anchor="middle" fill="#12002B" font-size="21" font-weight="700">Gateway attempts stored method</text>
    <rect x="675" y="385" width="350" height="94" rx="20" fill="#FFF1E3" stroke="#F6BD80" stroke-width="2"/><text x="850" y="421" text-anchor="middle" fill="#FE8218" font-size="15" font-weight="700">MANUAL</text><text x="850" y="450" text-anchor="middle" fill="#12002B" font-size="21" font-weight="700">Customer returns to checkout</text>
    <path d="M350 479v65h165M850 479v65H685" fill="none" stroke="#873EFF" stroke-width="3" marker-end="url(#a)"/>
    <rect x="465" y="520" width="270" height="82" rx="20" fill="#18A554"/><text x="600" y="554" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">Paid renewal</text><text x="600" y="580" text-anchor="middle" fill="#DFF6E9" font-size="15">active + next date</text>
    <path d="M350 479v180h120M850 479v180H730" fill="none" stroke="#FE8218" stroke-width="3" stroke-dasharray="9 9" marker-end="url(#a)"/>
    <rect x="470" y="625" width="260" height="78" rx="20" fill="#12002B"/><text x="600" y="657" text-anchor="middle" fill="#fff" font-size="19" font-weight="700">On-Hold / recovery</text><text x="600" y="682" text-anchor="middle" fill="#DCCFF0" font-size="15">pay, retry, cancel, or expire</text>
    <path d="M735 561h320v-270H620v-51" fill="none" stroke="#873EFF" stroke-width="3" stroke-dasharray="9 9" marker-end="url(#a)"/><text x="920" y="548" fill="#5B476F" font-size="15">repeat while the agreement continues</text>
  </g>
</svg>
