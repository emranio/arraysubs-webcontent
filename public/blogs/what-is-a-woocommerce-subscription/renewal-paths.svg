<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Automatic versus manual subscription renewal</title><desc id="desc">Two paths begin with a renewal order. Automatic uses a stored gateway method, while manual sends the customer through checkout.</desc>
  <rect width="1200" height="650" fill="#FAF8FF"/>
  <g font-family="Arial, sans-serif">
    <text x="60" y="66" fill="#12002B" font-size="38" font-weight="700">One due renewal, two payment paths</text><text x="60" y="103" fill="#5B476F" font-size="19">“Manual” means the customer completes payment—not that an admin remembers the date.</text>
    <rect x="430" y="140" width="340" height="80" rx="20" fill="#12002B"/><text x="600" y="174" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">Renewal order is due</text><text x="600" y="201" text-anchor="middle" fill="#DCCFF0" font-size="15">created from the subscription schedule</text>
    <path d="M520 220v58H300v50M680 220v58h220v50" fill="none" stroke="#873EFF" stroke-width="4"/>
    <rect x="90" y="328" width="420" height="210" rx="26" fill="#E9F7EF" stroke="#8AD0A8" stroke-width="2"/><text x="130" y="370" fill="#18A554" font-size="15" font-weight="700" letter-spacing="2">AUTOMATIC RENEWAL</text><rect x="130" y="397" width="116" height="74" rx="18" fill="#18A554"/><path d="M156 434h64M171 416h34M171 451h34" stroke="#fff" stroke-width="4" stroke-linecap="round"/><path d="M246 434h44" stroke="#18A554" stroke-width="4"/><circle cx="326" cy="434" r="38" fill="#fff" stroke="#18A554" stroke-width="4"/><path d="M308 434l12 12 26-29" fill="none" stroke="#18A554" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="130" y="507" fill="#12002B" font-size="18" font-weight="700">Gateway attempts stored method</text><text x="130" y="530" fill="#5B476F" font-size="15">No customer action on normal success</text>
    <rect x="690" y="328" width="420" height="210" rx="26" fill="#FFF1E3" stroke="#F6BD80" stroke-width="2"/><text x="730" y="370" fill="#FE8218" font-size="15" font-weight="700" letter-spacing="2">MANUAL RENEWAL</text><circle cx="790" cy="433" r="40" fill="#FE8218"/><circle cx="790" cy="422" r="10" fill="#fff"/><path d="M770 451c5-15 35-15 40 0" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/><path d="M835 433h44" stroke="#FE8218" stroke-width="4"/><rect x="880" y="397" width="116" height="74" rx="18" fill="#fff" stroke="#FE8218" stroke-width="3"/><path d="M900 418h76M900 435h50M900 452h66" stroke="#FE8218" stroke-width="4" stroke-linecap="round"/><text x="730" y="507" fill="#12002B" font-size="18" font-weight="700">Invoice brings customer to checkout</text><text x="730" y="530" fill="#5B476F" font-size="15">Customer selects and completes payment</text>
    <rect x="430" y="577" width="340" height="42" rx="21" fill="#873EFF"/><text x="600" y="604" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Success records payment and advances the agreement</text>
  </g>
</svg>
