<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">WooCommerce subscription entity map</title><desc id="desc">A catalog product reaches checkout, which creates one parent order and one customer subscription connected to multiple renewal orders.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3 0 6z" fill="#873EFF"/></marker></defs>
  <rect width="1200" height="680" fill="#FAF8FF"/>
  <g font-family="Arial, sans-serif">
    <text x="60" y="66" fill="#12002B" font-size="38" font-weight="700">One offer, one agreement, many transactions</text><text x="60" y="103" fill="#5B476F" font-size="19">Each record has one clear job.</text>
    <rect x="70" y="170" width="250" height="160" rx="24" fill="#F0E9FF" stroke="#BFA8EA" stroke-width="2"/><text x="195" y="212" text-anchor="middle" fill="#873EFF" font-size="15" font-weight="700" letter-spacing="2">CATALOG</text><text x="195" y="252" text-anchor="middle" fill="#12002B" font-size="25" font-weight="700">Product / plan</text><text x="195" y="287" text-anchor="middle" fill="#5B476F" font-size="17">Reusable offer for</text><text x="195" y="311" text-anchor="middle" fill="#5B476F" font-size="17">many customers</text>
    <path d="M320 250h110" stroke="#873EFF" stroke-width="4" marker-end="url(#a)"/>
    <rect x="435" y="190" width="210" height="120" rx="24" fill="#12002B"/><text x="540" y="240" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">Checkout</text><text x="540" y="275" text-anchor="middle" fill="#DCCFF0" font-size="16">the creation event</text>
    <path d="M645 250h85v-90h70M645 250h85v190h70" fill="none" stroke="#873EFF" stroke-width="4" marker-end="url(#a)"/>
    <rect x="805" y="105" width="325" height="160" rx="24" fill="#fff" stroke="#FE8218" stroke-width="3"/><text x="967" y="147" text-anchor="middle" fill="#FE8218" font-size="15" font-weight="700" letter-spacing="2">PAST TRANSACTION</text><text x="967" y="187" text-anchor="middle" fill="#12002B" font-size="25" font-weight="700">Parent order</text><text x="967" y="222" text-anchor="middle" fill="#5B476F" font-size="17">Signup or first payment</text><text x="967" y="246" text-anchor="middle" fill="#5B476F" font-size="17">at most one per subscription</text>
    <rect x="805" y="365" width="325" height="160" rx="24" fill="#873EFF"/><text x="967" y="407" text-anchor="middle" fill="#E9DEFF" font-size="15" font-weight="700" letter-spacing="2">FUTURE AGREEMENT</text><text x="967" y="447" text-anchor="middle" fill="#fff" font-size="25" font-weight="700">Subscription</text><text x="967" y="482" text-anchor="middle" fill="#E9DEFF" font-size="17">Status · dates · totals</text><text x="967" y="506" text-anchor="middle" fill="#E9DEFF" font-size="17">payment method · customer</text>
    <path d="M805 445H690v120" fill="none" stroke="#873EFF" stroke-width="4" marker-end="url(#a)"/>
    <g><rect x="140" y="545" width="220" height="88" rx="18" fill="#fff" stroke="#18A554" stroke-width="2"/><rect x="395" y="545" width="220" height="88" rx="18" fill="#fff" stroke="#18A554" stroke-width="2"/><rect x="650" y="545" width="220" height="88" rx="18" fill="#fff" stroke="#18A554" stroke-width="2"/><text x="250" y="580" text-anchor="middle" fill="#12002B" font-size="20" font-weight="700">Renewal order 1</text><text x="250" y="608" text-anchor="middle" fill="#5B476F" font-size="15">one billing event</text><text x="505" y="580" text-anchor="middle" fill="#12002B" font-size="20" font-weight="700">Renewal order 2</text><text x="505" y="608" text-anchor="middle" fill="#5B476F" font-size="15">one billing event</text><text x="760" y="580" text-anchor="middle" fill="#12002B" font-size="20" font-weight="700">Renewal order …</text><text x="760" y="608" text-anchor="middle" fill="#5B476F" font-size="15">many over time</text></g>
    <path d="M690 565H360M690 565H615M690 565H650" stroke="#873EFF" stroke-width="3"/>
  </g>
</svg>
