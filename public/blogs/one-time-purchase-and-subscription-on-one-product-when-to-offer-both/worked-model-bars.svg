<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Buy once or subscribe: earn the second option: worked model</title>
  <desc id="desc">Values illustrate the decision framework; they are not observed customer performance</desc>
  <rect width="1200" height="700" rx="36" fill="#fbf9ff"/>
  <rect x="32" y="32" width="1136" height="636" rx="28" fill="none" stroke="#d8c8f4" stroke-width="2"/>
  <text x="72" y="92" fill="#7c3cff" font-family="Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="2">ARRAYSUBS FIELD GUIDE</text>
  <text x="72" y="142" fill="#160033" font-family="Arial, sans-serif" font-size="34" font-weight="700">Buy once or subscribe: earn the second option: worked model</text>
  <text x="72" y="178" fill="#5a4775" font-family="Arial, sans-serif" font-size="17">Values illustrate the decision framework; they are not observed customer performance</text>
  <text x="290" y="296" text-anchor="end" fill="#160033" font-family="Arial" font-size="17" font-weight="700">Buy once</text><rect x="330" y="270" width="760" height="38" rx="12" fill="#ffffff" stroke="#d8c8f4"/><rect x="330" y="270" width="285" height="38" rx="12" fill="#7c3cff"/><text x="629" y="296" fill="#160033" font-family="Arial" font-size="16" font-weight="700">45</text><text x="290" y="372" text-anchor="end" fill="#160033" font-family="Arial" font-size="17" font-weight="700">Subscribe per delivery</text><rect x="330" y="346" width="760" height="38" rx="12" fill="#ffffff" stroke="#d8c8f4"/><rect x="330" y="346" width="253.33333333333331" height="38" rx="12" fill="#16a75c"/><text x="597.3333333333333" y="372" fill="#160033" font-family="Arial" font-size="16" font-weight="700">40</text><text x="290" y="448" text-anchor="end" fill="#160033" font-family="Arial" font-size="17" font-weight="700">Three subscribed deliveries</text><rect x="330" y="422" width="760" height="38" rx="12" fill="#ffffff" stroke="#d8c8f4"/><rect x="330" y="422" width="760" height="38" rx="12" fill="#ff7a1a"/><text x="1104" y="448" fill="#160033" font-family="Arial" font-size="16" font-weight="700">120</text><text x="600" y="625" text-anchor="middle" fill="#5a4775" font-family="Arial" font-size="15">Replace the example inputs with your own prices, costs, and policies.</text>
